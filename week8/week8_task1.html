<html lang="en">

<body>
    <script>
        var mark = 90;
        if (mark >= 70) {
            console.log("This is a First");
        } else if (mark >= 60 && mark <= 69) {
            console.log("This is a 2:1");
        } else if (mark >= 50 && mark <= 59) {
            console.log("This is a 2:2");
        } else if (mark >= 40 && mark <= 49) {
            console.log("This is a Third");
        }
    </script>
</body>
